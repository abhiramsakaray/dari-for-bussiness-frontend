<!DOCTYPE html>
<html>
<head>
    <title>API Endpoint Tester</title>
</head>
<body>
    <h1>Test API Endpoints</h1>
    <div id="results"></div>
    
    <script>
        const API_BASE = 'http://localhost:8000';
        const results = document.getElementById('results');
        
        async function testEndpoint(method, path, body = null) {
            try {
                const options = {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                    }
                };
                
                if (body) {
                    options.body = JSON.stringify(body);
                }
                
                const response = await fetch(API_BASE + path, options);
                const text = await response.text();
                
                results.innerHTML += `<p><strong>${method} ${path}</strong>: ${response.status} ${response.statusText}</p>`;
                results.innerHTML += `<pre>${text.substring(0, 200)}</pre><hr>`;
            } catch (error) {
                results.innerHTML += `<p><strong>${method} ${path}</strong>: ERROR - ${error.message}</p><hr>`;
            }
        }
        
        // Test different endpoints
        (async () => {
            results.innerHTML = '<p>Testing endpoints...</p>';
            
            await testEndpoint('GET', '/health');
            await testEndpoint('GET', '/auth/register');
            await testEndpoint('POST', '/auth/register', {
                name: 'Test',
                email: 'test@test.com',
                password: 'test123'
            });
            await testEndpoint('POST', '/merchant/register', {
                name: 'Test',
                email: 'test@test.com',
                password: 'test123'
            });
            await testEndpoint('POST', '/api/v1/auth/register', {
                name: 'Test',
                email: 'test@test.com',
                password: 'test123'
            });
            
            results.innerHTML += '<p><strong>Testing complete!</strong></p>';
        })();
    </script>
</body>
</html>
